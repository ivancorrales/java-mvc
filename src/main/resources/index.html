<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado de alumnos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
        }

        h1 {
            color: #333;
        }

        .alumno {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
<h1>Listado de alumnos</h1>

<button onclick="cargarAlumnos()">Cargar alumnos</button>

<div id="contenedor"></div>

<script>
    async function cargarAlumnos() {
        const contenedor = document.getElementById("contenedor");
        contenedor.innerHTML = "<p>Cargando alumnos...</p>";

        try {
            const respuesta = await fetch("http://localhost:8090/alumnos");

            if (!respuesta.ok) {
                throw new Error("Error al obtener los datos");
            }

            const alumnos = await respuesta.json();

            if (alumnos.length === 0) {
                contenedor.innerHTML = "<p>No hay alumnos.</p>";
                return;
            }

            contenedor.innerHTML = "";

            alumnos.forEach(alumno => {
                const div = document.createElement("div");
                div.className = "alumno";
                div.innerHTML = `
            <strong>ID:</strong> ${alumno.id}<br>
            <strong>Nombre:</strong> ${alumno.nombre}<br>
            <strong>Apellidos:</strong> ${alumno.apellidos}<br>
            <strong>Año de nacimiento:</strong> ${alumno.anioNacimiento}
          `;
                contenedor.appendChild(div);
            });

        } catch (error) {
            contenedor.innerHTML = `<p class="error">${error.message}</p>`;
        }
    }
</script>
</body>
</html>
