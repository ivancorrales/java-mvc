services:
  postgres:
    image: postgres:16
    container_name: dam1-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dam1
      POSTGRES_USER: dam1
      POSTGRES_PASSWORD: dam1pass
    ports:
      - "5432:5432"
    volumes:
      - dam1_pgdata:/var/lib/postgresql/data

  app:
    image: database-intro:0.0.1
    depends_on:
      - postgres
    ports:
      - 8090:8080
    environment:
      JDBC_URL: jdbc:postgresql://postgres:5432/dam1
      JDBC_USER: dam1
      JDBC_PASSWORD: dam1pass


volumes:
  my-db:
  dam1_pgdata: